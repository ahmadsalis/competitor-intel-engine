name: Daily Real Estate Scraper

on:
  schedule:
    # This is "Cron" syntax for 8:00 AM UTC every day
    - cron: '0 8 * * *'
  workflow_dispatch: # This allows you to run it manually for testing

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          playwright install chromium --with-deps

      - name: Run Scraper
        run: python scraper.py  # Make sure your script is named scraper.py

      - name: Commit and Push CSV
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          git add listings.csv
          git commit -m "Daily update: Scraped new listings" || exit 0
          git push